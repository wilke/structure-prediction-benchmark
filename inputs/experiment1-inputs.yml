# Experiment 1: Within-Tool Quality Assessment
# Runs all four prediction tools (AlphaFold2, Boltz, Chai, ESMFold) on 10
# pilot targets and compares each prediction against the experimental structure.
#
# Generated from data/targets.json after running prepare_targets.py.
#
# Prerequisites:
#   - prepare_targets.py has been run (populates data/experimental/ and data/*.fasta)
#   - AlphaFold databases staged at alphafold_data_dir path below
#   - MSA generation is NOT required for Experiment 1:
#     AlphaFold runs its own MSA search, Boltz/Chai use use_msa_server: true,
#     ESMFold is single-sequence.

target_fastas:
  - class: File
    path: ../data/1ubq_chainA.fasta    # 1UBQ_A - Ubiquitin (76 res)
  - class: File
    path: ../data/1l2y_chainA.fasta    # 1L2Y_A - Trp-cage miniprotein (20 res)
  - class: File
    path: ../data/1mbn_chainA.fasta    # 1MBN_A - Myoglobin (153 res)
  - class: File
    path: ../data/1ten_chainA.fasta    # 1TEN_A - Tenascin fibronectin III (90 res)
  - class: File
    path: ../data/1ake_chainA.fasta    # 1AKE_A - Adenylate kinase (214 res)
  - class: File
    path: ../data/4lzt_chainA.fasta    # 4LZT_A - Hen egg-white lysozyme (129 res)
  - class: File
    path: ../data/2src_chainA.fasta    # 2SRC_A - Src tyrosine kinase (449 res)
  - class: File
    path: ../data/1bl8_chainA.fasta    # 1BL8_A - Galectin-1 (97 res)
  - class: File
    path: ../data/7mrx_chainB.fasta    # 7MRX_B - CASP14 target T1091 (90 res)
  - class: File
    path: ../data/7s0b_chainA.fasta    # 7S0B_A - CASP15 target (218 res)

target_experimental_pdbs:
  - class: File
    path: ../data/experimental/1ubq_chainA.pdb
  - class: File
    path: ../data/experimental/1l2y_chainA.pdb
  - class: File
    path: ../data/experimental/1mbn_chainA.pdb
  - class: File
    path: ../data/experimental/1ten_chainA.pdb
  - class: File
    path: ../data/experimental/1ake_chainA.pdb
  - class: File
    path: ../data/experimental/4lzt_chainA.pdb
  - class: File
    path: ../data/experimental/2src_chainA.pdb
  - class: File
    path: ../data/experimental/1bl8_chainA.pdb
  - class: File
    path: ../data/experimental/7mrx_chainB.pdb
  - class: File
    path: ../data/experimental/7s0b_chainA.pdb

boltz_yamls:
  - class: File
    path: ../data/1ubq_chainA.boltz.yaml
  - class: File
    path: ../data/1l2y_chainA.boltz.yaml
  - class: File
    path: ../data/1mbn_chainA.boltz.yaml
  - class: File
    path: ../data/1ten_chainA.boltz.yaml
  - class: File
    path: ../data/1ake_chainA.boltz.yaml
  - class: File
    path: ../data/4lzt_chainA.boltz.yaml
  - class: File
    path: ../data/2src_chainA.boltz.yaml
  - class: File
    path: ../data/1bl8_chainA.boltz.yaml
  - class: File
    path: ../data/7mrx_chainB.boltz.yaml
  - class: File
    path: ../data/7s0b_chainA.boltz.yaml

alphafold_data_dir:
  class: Directory
  path: /data/alphafold-databases

# Experiment 4: MSA Depth Sensitivity Analysis
# Tests how subsampling MSAs to different depths affects Boltz prediction quality.
# All 4 MSA tool×database combinations × 10 pilot targets × 10 depth levels.
#
# Before running, ensure:
#   - prepare_targets.py has been run (FASTA + PDB files)
#   - generate_msas.py has been run with both mmseqs2 and jackhmmer methods
#     against both uniref30 and uniref90 databases

# --- Target sequences (for reference; MSAs are precomputed) ---
target_fastas:
  - {class: File, path: ../data/1ubq_chainA.fasta}
  - {class: File, path: ../data/1l2y_chainA.fasta}
  - {class: File, path: ../data/1mbn_chainA.fasta}
  - {class: File, path: ../data/1ten_chainA.fasta}
  - {class: File, path: ../data/1ake_chainA.fasta}
  - {class: File, path: ../data/4lzt_chainA.fasta}
  - {class: File, path: ../data/2src_chainA.fasta}
  - {class: File, path: ../data/1bl8_chainA.fasta}
  - {class: File, path: ../data/7mrx_chainB.fasta}
  - {class: File, path: ../data/7s0b_chainA.fasta}

# --- Experimental reference structures (same order as target_fastas) ---
experimental_pdbs:
  - {class: File, path: ../data/experimental/1ubq_chainA.pdb}
  - {class: File, path: ../data/experimental/1l2y_chainA.pdb}
  - {class: File, path: ../data/experimental/1mbn_chainA.pdb}
  - {class: File, path: ../data/experimental/1ten_chainA.pdb}
  - {class: File, path: ../data/experimental/1ake_chainA.pdb}
  - {class: File, path: ../data/experimental/4lzt_chainA.pdb}
  - {class: File, path: ../data/experimental/2src_chainA.pdb}
  - {class: File, path: ../data/experimental/1bl8_chainA.pdb}
  - {class: File, path: ../data/experimental/7mrx_chainB.pdb}
  - {class: File, path: ../data/experimental/7s0b_chainA.pdb}

